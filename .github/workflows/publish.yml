# Release pipeline.
#
# `production` is release-only; every push to it (typically a merge
# from `main` via PR) cuts a new GitHub Release with the source
# tarball, source zip, and the three installers as downloadable
# assets — that's what install.sh / install.ps1 fetch from the
# /releases/latest/download/ path.
#
# Version comes from VERSION at the repo root. Bump it in the PR
# that lands the release; CI tags the commit with v<X.Y.Z> after
# publishing.

name: publish

on:
  push:
    branches: [production]

permissions:
  contents: write  # create releases + push tags

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so we can read prior tags + commit messages

      - name: Resolve version
        id: version
        run: |
          FILE_VERSION=$(tr -d '[:space:]' < VERSION 2>/dev/null || echo "")
          LATEST_TAG=$(git tag --sort=-v:refname | head -n1 | sed 's/^v//')

          # Auto-bump patch from latest tag
          if [ -n "$LATEST_TAG" ]; then
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_TAG"
            AUTO_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          else
            AUTO_VERSION="0.1.0"
          fi

          # Use VERSION file if it's higher (manual minor/major bump),
          # otherwise use auto-bumped patch.
          if [ -n "$FILE_VERSION" ] && [ "$(printf '%s\n' "$FILE_VERSION" "$AUTO_VERSION" | sort -V | tail -n1)" = "$FILE_VERSION" ] \
             && [ "$FILE_VERSION" != "$AUTO_VERSION" ]; then
            VERSION="$FILE_VERSION"
          else
            VERSION="$AUTO_VERSION"
          fi

          # Fail if tag already exists (shouldn't happen with auto-bump)
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "::error::tag v${VERSION} already exists"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"    >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION (file=$FILE_VERSION, auto=$AUTO_VERSION, latest_tag=$LATEST_TAG)"

      - name: Sync VERSION file and version strings
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "$VERSION" > VERSION
          sed -i "s/version=\"[0-9]*\.[0-9]*\.[0-9]*\"/version=\"$VERSION\"/g" src/server.py || true
          sed -i "s/\"version\": \"[0-9]*\.[0-9]*\.[0-9]*\"/\"version\": \"$VERSION\"/g" src/routes/health.py || true
          if git diff --quiet; then
            echo "No version files to update"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add VERSION src/server.py src/routes/health.py
            git commit -m "chore: bump version to $VERSION [skip ci]"
            git push origin HEAD:production
          fi

      - name: Build source archives
        run: |
          mkdir -p dist
          VERSION="${{ steps.version.outputs.version }}"
          tar --exclude='./dist' \
              --exclude='./.git' \
              --exclude='./.venv' \
              --exclude='./__pycache__' \
              --exclude='*.pyc' \
              --exclude='./printers.json' \
              --exclude='./terminals.json' \
              -czf "dist/barhandler-manager-${VERSION}.tar.gz" .
          zip -rq "dist/barhandler-manager-${VERSION}.zip" . \
              -x 'dist/*' '.git/*' '.venv/*' '*.pyc' '__pycache__/*' \
              'printers.json' 'terminals.json'

      - name: Stage installers as named assets
        run: |
          cp installers/install.sh         dist/install.sh
          cp installers/install-android.sh dist/install-android.sh
          cp installers/install.ps1        dist/install.ps1
          chmod +x dist/install.sh dist/install-android.sh

      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | head -n1)
          if [ -z "$PREV_TAG" ]; then
            RANGE=HEAD
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          {
            # If CHANGELOG.md has an [Unreleased] section, surface that
            # first — it's the human-curated story of the release.
            if [ -f CHANGELOG.md ] && grep -q '## \[Unreleased\]' CHANGELOG.md; then
              awk '/^## \[Unreleased\]/{flag=1;next} /^## \[/{flag=0} flag' CHANGELOG.md
              echo
            fi
            echo "## Commits"
            git log "$RANGE" --pretty=format:'- %s (%h)' --no-merges
            echo
            echo
            echo "## Install"
            echo
            echo "**macOS / Linux / Raspberry Pi**"
            echo '```bash'
            echo "curl -fsSL https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/install.sh | bash"
            echo '```'
            echo
            echo "**Windows**"
            echo '```powershell'
            echo "irm https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/install.ps1 | iex"
            echo '```'
            echo
            echo "**Android (Termux)**"
            echo '```bash'
            echo "curl -fsSL https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/install-android.sh | bash"
            echo '```'
          } > dist/notes.md

      - name: Tag the commit
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: dist/notes.md
          draft: false
          prerelease: false
          files: |
            dist/barhandler-manager-${{ steps.version.outputs.version }}.tar.gz
            dist/barhandler-manager-${{ steps.version.outputs.version }}.zip
            dist/install.sh
            dist/install-android.sh
            dist/install.ps1
